[pytest]
testpaths = tests
python_files = test_*.py
asyncio_mode = auto
pythonpath = .
addopts = --cov=. --cov-report=html --cov-report=term-missing --cov-fail-under=75

[coverage:run]
omit =
    */tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.: