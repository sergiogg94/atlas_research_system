services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: atlas_research_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      - postgres
    volumes:
      - ./backend/app:/app/app

  postgres:
    image: postgres:15-alpine
    container_name: atlas_research_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: atlas_research_redis
    ports:
      - "6379:6379"


volumes:
  postgres_data: